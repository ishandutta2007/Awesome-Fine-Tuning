<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f005c">
        <animate attributeName="stop-color" values="#1f005c; #5b0060; #870160; #ac255e; #ca485c; #e16b5c; #f39060; #ffb56b; #1f005c" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ffb56b">
        <animate attributeName="stop-color" values="#ffb56b; #f39060; #e16b5c; #ca485c; #ac255e; #870160; #5b0060; #1f005c; #ffb56b" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="15" ry="15" />
  
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    Awesome Fine-Tuning
  </text>
  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#f0f0f0" letter-spacing="2">
    HISTORY • PROGRESSION • VARIANTS • APPLICATIONS
  </text>
  
  <!-- Decorative animated elements -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite" />
    <animate attributeName="r" values="30;50;30" dur="4s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="700" cy="100" r="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="360 700 100" to="0 700 100" dur="8s" repeatCount="indefinite" />
    <animate attributeName="r" values="50;30;50" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>
